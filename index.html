<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <meta name="title" content="Calculadora">
    <meta name="description" content="Calculadora para remesas">
    <link rel="icon" type="image/png" href="./assets/img/calculator.svg">
    <!-- Styles  -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>

        <nav class="barra-navegacion max-width-container">

            <ul>

                <li id="venezuela" data-ruta="VES/index_VES.html">VES</li>

                <li id="colombia" data-ruta="COP/index_COP.html">COP</li>

                <li id="peru" data-ruta="PEN/index_PEN.html">PEN</li>

                <li id="argentina" data-ruta="ARS/index_ARS.html">ARS</li>

                <li class="is-active" id="otros" data-ruta="index.html">Otros</li>

            </ul>

        </nav>

    </header>

    <main class="contenedor max-width-container">

        <div class="contenedor-comision">

            <h1>Calculadora de comisiones</h1>

            <input id="cantidad-bolivar" placeholder="Bolivares" type="number" step="any" data-memoria data-actualizar>

            <p id="resultado">23,21</p>

            <span id="comision"></span>

        </div>

        <div class="contenedor-ganancia">

            <h2>Ganancia diaria</h2>

            <input id="cantidad-anterior" placeholder="Dia Anterior" type="number" step="any" data-memoria
                data-actualizar>

            <input id="cantidad-siguiente" placeholder="Dia Siguiente" type="number" step="any" data-memoria
                data-actualizar>

            <p id="ganancia-diaria">0</p>

        </div>

    </main>

    <script src="./script.js"></script>

</body>

</html>
